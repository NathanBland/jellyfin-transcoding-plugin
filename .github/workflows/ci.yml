name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-package:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - slug: transcoding-policy
            solution: Jellyfin.Plugin.TranscodingPolicy.slnx
          - slug: commercial-skipper
            solution: Jellyfin.Plugin.CommercialSkipper.slnx
          - slug: recording-transcoder
            solution: Jellyfin.Plugin.RecordingTranscoder.slnx
    defaults:
      run:
        working-directory: plugins/${{ matrix.slug }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.316

      - name: Restore
        run: dotnet restore "${{ matrix.solution }}"

      - name: Build
        run: dotnet build "${{ matrix.solution }}" --configuration Release --no-restore

      - name: Test plugin
        run: dotnet test "${{ matrix.solution }}" --configuration Release --no-build

      - name: Test shared release tooling
        if: matrix.slug == 'transcoding-policy'
        run: python3 -m unittest scripts.tests.test_update_manifest

      - name: Package
        run: ./scripts/package.sh

      - name: Verify Jellyfin startup with Commercial Skipper
        if: matrix.slug == 'commercial-skipper'
        shell: bash
        run: |
          VERSION="$(sed -n 's/^version: *"\([^"]*\)".*/\1/p' build.yaml)"
          ./scripts/verify-jellyfin-startup.sh "artifacts/commercial-skipper_${VERSION}.zip"

      - name: Validate package layout and checksums
        shell: bash
        run: |
          VERSION="$(sed -n 's/^version: *"\([^"]*\)".*/\1/p' build.yaml)"
          ARCHIVE="artifacts/${{ matrix.slug }}_${VERSION}.zip"
          python3 scripts/validate_package.py --archive "$ARCHIVE"
          (cd artifacts && sha256sum --check "$(basename "$ARCHIVE").sha256")
          (cd artifacts && md5sum --check "$(basename "$ARCHIVE").md5")

      - name: Upload package
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.slug }}
          path: |
            plugins/${{ matrix.slug }}/artifacts/${{ matrix.slug }}_*.zip
            plugins/${{ matrix.slug }}/artifacts/${{ matrix.slug }}_*.zip.sha256
            plugins/${{ matrix.slug }}/artifacts/${{ matrix.slug }}_*.zip.md5
          if-no-files-found: error
